spring.application.name=smartcontactmanager
server.port=8787
#database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/smartcontact
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#dialect is a language which is used to interact between database and the application(springboot)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


#hibernate.ddl-auto creates database according to our entity classes 
spring.jpa.hibernate.ddl-auto=update


