<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Example of loop</title>
</head>
<body>
<h1>Going to traverse element in collection....</h1>
<h1 th:text="${name}"></h1>

<ul>

<li th:each="n:${name}">
<span th:text="${n}">
</span>


</li>

</ul>





</body>
</html>
