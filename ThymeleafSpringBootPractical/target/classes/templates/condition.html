<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Example of Conditions</title>
</head>
<body>
<h1>condition statement</h1>
<h1>user is <span th:style="${isActive}? 'color:green':'color:red' " th:text="${isActive} ? 'Active' :'Not Active'"></span> </h1>

<h1 th:if="${gender}=='M'">Male</h1>

<h1 th:unless="${gender}=='M'"> Female</h1>

<div th:switch="${#lists.size(mylist)}">

<h1 th:case="'0'">list is empty</h1>
<h1 th:case="'1'">list contains one element </h1>
<h1 th:case="'*'">List contains more then one element</h1>

</div>





</body>
</html>
